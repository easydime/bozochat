<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BozoChat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    #container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      gap: 20px;
    }

    #container.show {
      opacity: 1;
    }

    /* Media display */
    #media-content {
      display: none;
      max-width: 95vw;
      max-height: 80vh;
      flex-shrink: 1;
      min-height: 0;
    }

    #media-content img,
    #media-content video {
      max-width: 100%;
      max-height: 80vh;
      display: block;
      object-fit: contain;
      animation: fadeIn 0.3s ease;
    }

    /* Text display */
    #message-content {
      display: none;
      color: #fff;
      font-size: 48px;
      font-weight: 700;
      text-align: center;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      padding: 10px 20px;
      max-width: 90vw;
      word-wrap: break-word;
      flex-shrink: 0;
      animation: fadeIn 0.3s ease;
    }

    #message-content.with-media {
      font-size: 28px;
      max-height: 15vh;
      overflow: hidden;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="media-content"></div>
    <div id="message-content"></div>
  </div>

  <script>
    const container = document.getElementById('container');
    const mediaContent = document.getElementById('media-content');
    const messageContent = document.getElementById('message-content');

    // Called by Rust: webview.evaluate_script("showNotification({...})")
    function showNotification(data) {
      // Reset
      mediaContent.style.display = 'none';
      mediaContent.innerHTML = '';
      messageContent.style.display = 'none';
      messageContent.textContent = '';
      messageContent.classList.remove('with-media');

      // Handle media
      if (data.mediaType && data.mediaData) {
        const mediaType = data.mediaType.split('/')[0]; // 'image' or 'video'
        const mimeType = data.mediaType;
        const base64Data = data.mediaData;

        if (mediaType === 'image') {
          showImage(base64Data, mimeType);
        } else if (mediaType === 'video') {
          showVideo(base64Data, mimeType);
        }
      }

      // Handle message
      if (data.message && data.message.trim()) {
        messageContent.textContent = data.message;
        messageContent.style.display = 'block';

        // Smaller text if also showing media
        if (data.mediaType && data.mediaData) {
          messageContent.classList.add('with-media');
        }
      }

      // Show overlay
      container.classList.add('show');
    }

    // Whitelist of allowed MIME types for security
    const VALID_IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
    const VALID_VIDEO_TYPES = ['video/mp4', 'video/webm', 'video/quicktime'];

    function showImage(base64Data, mimeType) {
      // Validate MIME type
      if (!VALID_IMAGE_TYPES.includes(mimeType)) {
        console.error('Invalid image MIME type:', mimeType);
        return;
      }
      mediaContent.style.display = 'block';
      const img = document.createElement('img');
      img.src = `data:${mimeType};base64,${base64Data}`;
      img.alt = 'Image';
      mediaContent.appendChild(img);
    }

    function showVideo(base64Data, mimeType) {
      // Validate MIME type
      if (!VALID_VIDEO_TYPES.includes(mimeType)) {
        console.error('Invalid video MIME type:', mimeType);
        return;
      }
      mediaContent.style.display = 'block';
      const video = document.createElement('video');
      video.autoplay = true;
      video.controls = false;
      video.loop = false;

      // MOV (video/quicktime) n'est pas supporté par WebView2 comme type MIME,
      // mais le flux H.264 est souvent lisible — on essaie video/mp4 en fallback.
      const tryTypes = mimeType === 'video/quicktime'
        ? ['video/mp4', '']
        : [mimeType];

      function tryNext(types) {
        if (types.length === 0) {
          console.error('Impossible de lire la vidéo avec tous les types MIME tentés');
          return;
        }
        const [type, ...rest] = types;
        video.src = type
          ? `data:${type};base64,${base64Data}`
          : `data:;base64,${base64Data}`;

        video.onerror = () => tryNext(rest);
      }
      tryNext(tryTypes);

      // Dès que la durée est connue, on la communique à Rust pour overrider le timer
      video.onloadedmetadata = () => {
        if (video.duration && isFinite(video.duration)) {
          const durationMs = Math.ceil(video.duration * 1000) + 500; // +500ms marge
          window.ipc.postMessage(`set-duration:${durationMs}`);
        }
      };

      video.onended = () => {
        hideOverlay();
      };

      mediaContent.appendChild(video);
    }

    function hideOverlay() {
      container.classList.remove('show');
      setTimeout(() => {
        window.ipc.postMessage('hide');
      }, 300);
    }

    // ESC key to dismiss
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideOverlay();
      }
    });

    // Click anywhere to dismiss
    container.addEventListener('click', () => {
      hideOverlay();
    });
  </script>
</body>
</html>
